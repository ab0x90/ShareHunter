<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareHunter — Log Viewer</title>
  <style>
    :root {
      --bg:        #0d1117;
      --bg2:       #161b22;
      --bg3:       #21262d;
      --border:    #30363d;
      --text:      #c9d1d9;
      --text-dim:  #8b949e;
      --accent:    #58a6ff;
      --black-clr: #6e40c9;
      --red-clr:   #e74c3c;
      --yellow-clr:#e3b341;
      --green-clr: #3fb950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; }

    /* ── Top bar ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 18px; color: var(--accent); letter-spacing: 1px; }
    header a { color: var(--text-dim); text-decoration: none; font-size: 12px; }
    header a:hover { color: var(--accent); }
    #file-info { margin-left: auto; color: var(--text-dim); font-size: 12px; }

    /* ── File loader panel ── */
    #loader-panel {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; color: var(--text-dim); }
    .form-group select, .form-group input[type=text] {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 5px 8px; border-radius: 4px;
      font-family: inherit; font-size: 12px; min-width: 320px;
    }
    .form-group select:focus, .form-group input:focus { outline: none; border-color: var(--accent); }
    .form-group input[type=file] {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 4px 8px; border-radius: 4px;
      font-family: inherit; font-size: 12px; cursor: pointer;
    }
    button.btn {
      padding: 6px 16px; border-radius: 4px; border: 1px solid;
      cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
    }
    .btn-load  { background: #1c3a1c; border-color: var(--green-clr); color: var(--green-clr); }
    .btn-load:hover { background: #2a552a; }
    .btn-clear { background: var(--bg3); border-color: var(--border); color: var(--text-dim); }
    .btn-clear:hover { border-color: var(--text-dim); }
    .btn-export { background: var(--bg3); border-color: var(--border); color: var(--accent); }
    .btn-export:hover { border-color: var(--accent); }
    .loader-sep { color: var(--text-dim); align-self: center; font-size: 11px; }

    /* ── Priority tabs ── */
    .tab-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      padding: 0 20px;
      gap: 0;
    }
    .tab-btn {
      padding: 10px 18px; cursor: pointer;
      border: none; background: none; color: var(--text-dim);
      border-bottom: 2px solid transparent; font-size: 13px;
      font-family: inherit; transition: color .15s, border-color .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn.active.tab-Black  { color: var(--black-clr); border-bottom-color: var(--black-clr); }
    .tab-btn.active.tab-Red    { color: var(--red-clr);   border-bottom-color: var(--red-clr);   }
    .tab-btn.active.tab-Yellow { color: var(--yellow-clr);border-bottom-color: var(--yellow-clr);}
    .tab-btn.active.tab-Green  { color: var(--green-clr); border-bottom-color: var(--green-clr); }
    .tab-count {
      padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: bold;
    }
    .cnt-All    { background: var(--bg3);   color: var(--text-dim); }
    .cnt-Black  { background: #2a1f45;       color: var(--black-clr); }
    .cnt-Red    { background: #3a1c1c;       color: var(--red-clr);   }
    .cnt-Yellow { background: #3a2f10;       color: var(--yellow-clr);}
    .cnt-Green  { background: #1c3a1c;       color: var(--green-clr); }

    /* ── Search / filter bar ── */
    #search-bar {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    #search-bar input, #search-bar select {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 5px 8px; border-radius: 4px;
      font-family: inherit; font-size: 12px;
    }
    #search-input { width: 300px; }
    #search-bar input:focus, #search-bar select:focus { outline: none; border-color: var(--accent); }
    #match-count { margin-left: auto; color: var(--text-dim); font-size: 12px; }

    /* ── Empty / loading states ── */
    #empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: calc(100vh - 200px);
      color: var(--text-dim); gap: 12px;
    }
    #empty-state .big-icon { font-size: 48px; }
    #empty-state p { font-size: 14px; }

    /* ── Findings list ── */
    #findings-container {
      overflow-y: auto;
      height: calc(100vh - 200px);
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Finding card ── */
    .finding-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .finding-card:hover { background: var(--bg3); }
    .finding-card.rating-Black { border-left-color: var(--black-clr); }
    .finding-card.rating-Red   { border-left-color: var(--red-clr);   }
    .finding-card.rating-Yellow{ border-left-color: var(--yellow-clr);}
    .finding-card.rating-Green { border-left-color: var(--green-clr); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 10px;
      font-size: 10px; font-weight: bold; white-space: nowrap;
    }
    .badge-Black  { background: #2a1f45; color: var(--black-clr); }
    .badge-Red    { background: #3a1c1c; color: var(--red-clr);   }
    .badge-Yellow { background: #3a2f10; color: var(--yellow-clr);}
    .badge-Green  { background: #1c3a1c; color: var(--green-clr); }

    .rule-tag {
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: bold;
      background: var(--bg3); color: var(--accent);
      border: 1px solid var(--border);
    }
    .unc-path {
      font-size: 12px; color: var(--text);
      word-break: break-all; flex: 1;
    }
    .unc-path .host-part  { color: var(--accent); }
    .unc-path .share-part { color: var(--yellow-clr); }
    .unc-path .path-part  { color: var(--text); }

    .card-meta {
      display: flex; gap: 14px; align-items: center;
      font-size: 11px; color: var(--text-dim);
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .card-meta span { white-space: nowrap; }

    .match-preview {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 11px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 80px;
      overflow: hidden;
      position: relative;
      line-height: 1.5;
    }
    .match-preview.expanded { max-height: none; }
    .match-preview::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 24px;
      background: linear-gradient(transparent, var(--bg3));
      pointer-events: none;
    }
    .match-preview.expanded::after { display: none; }

    .expand-btn {
      background: none; border: none; color: var(--accent);
      font-size: 11px; cursor: pointer; padding: 2px 0; margin-top: 3px;
      font-family: inherit;
    }
    .expand-btn:hover { text-decoration: underline; }

    /* highlight search term in match */
    mark { background: #3a3010; color: var(--yellow-clr); border-radius: 2px; padding: 0 1px; }

    /* ── Detail modal ── */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 100;
      align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 24px; max-width: 820px; width: 92%;
      max-height: 85vh; overflow-y: auto;
    }
    #modal h2 { font-size: 15px; color: var(--accent); margin-bottom: 14px; }
    .modal-close {
      float: right; background: none; border: none; color: var(--text-dim);
      font-size: 20px; cursor: pointer; padding: 0 4px;
    }
    .modal-close:hover { color: var(--text); }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .detail-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .detail-table td:first-child { color: var(--text-dim); width: 130px; white-space: nowrap; }
    .detail-table td:last-child { word-break: break-all; }
    .modal-match-box {
      background: var(--bg3); border: 1px solid var(--border);
      padding: 10px 14px; border-radius: 4px; font-size: 12px;
      white-space: pre-wrap; word-break: break-all; margin-top: 10px;
      line-height: 1.6; max-height: 400px; overflow-y: auto;
    }
    .copy-btn {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--accent); padding: 4px 12px; border-radius: 4px;
      font-family: inherit; font-size: 11px; cursor: pointer; margin-top: 8px;
    }
    .copy-btn:hover { border-color: var(--accent); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>&#x1F4C4; Log Viewer</h1>
  <a href="/">&#x2190; Back to ShareHunter</a>
  <span id="file-info"></span>
</header>

<!-- File loader -->
<div id="loader-panel">
  <div class="form-group">
    <label>Select log file</label>
    <select id="log-select">
      <option value="">— choose a log —</option>
    </select>
  </div>
  <div style="align-self:flex-end;padding-bottom:2px">
    <button class="btn btn-load" onclick="loadSelected()">&#x25B6; Load</button>
  </div>
  <div class="loader-sep">or</div>
  <div class="form-group">
    <label>Upload / drag log file</label>
    <input type="file" id="file-upload" accept=".log,.txt" onchange="loadUploaded()">
  </div>
  <div style="align-self:flex-end;margin-left:auto;display:flex;gap:8px">
    <button class="btn btn-export" onclick="exportCSV()" id="export-btn" disabled>&#x2B07; CSV</button>
    <button class="btn btn-clear" onclick="clearViewer()">&#x1F5D1; Clear</button>
  </div>
</div>

<!-- Priority tabs -->
<div class="tab-bar" id="priority-tabs">
  <button class="tab-btn active" data-rating="All"    onclick="switchRating('All')">
    All <span class="tab-count cnt-All"    id="cnt-All">0</span>
  </button>
  <button class="tab-btn tab-Black" data-rating="Black"  onclick="switchRating('Black')">
    Black <span class="tab-count cnt-Black"  id="cnt-Black">0</span>
  </button>
  <button class="tab-btn tab-Red" data-rating="Red"    onclick="switchRating('Red')">
    Red <span class="tab-count cnt-Red"    id="cnt-Red">0</span>
  </button>
  <button class="tab-btn tab-Yellow" data-rating="Yellow" onclick="switchRating('Yellow')">
    Yellow <span class="tab-count cnt-Yellow" id="cnt-Yellow">0</span>
  </button>
  <button class="tab-btn tab-Green" data-rating="Green"  onclick="switchRating('Green')">
    Green <span class="tab-count cnt-Green"  id="cnt-Green">0</span>
  </button>
</div>

<!-- Search bar -->
<div id="search-bar">
  <input type="text" id="search-input" placeholder="Search path, rule, host, matched content…" oninput="scheduleFilter()">
  <select id="host-filter" onchange="scheduleFilter(true)">
    <option value="">All Hosts</option>
  </select>
  <select id="share-filter" onchange="scheduleFilter(true)">
    <option value="">All Shares</option>
  </select>
  <select id="rule-filter" onchange="scheduleFilter(true)">
    <option value="">All Rules</option>
  </select>
  <span id="match-count"></span>
</div>

<!-- Findings -->
<div id="findings-container">
  <div id="empty-state">
    <div class="big-icon">&#x1F4C4;</div>
    <p>Load a log file above to view findings.</p>
    <p style="font-size:11px;color:var(--text-dim)">Supports ShareHunter and Snaffler log formats.</p>
  </div>
</div>

<!-- Detail modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <h2>Finding Detail</h2>
    <div id="modal-body"></div>
  </div>
</div>

<script>
let allFindings = [];
let currentRating = 'All';
let filterTimer   = null;
const knownHosts  = new Set();
const knownShares = new Set();
const knownRules  = new Set();

const RATING_ORDER = { Black: 0, Red: 1, Yellow: 2, Green: 3 };

// ── On load: populate the log file list ───────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  fetch('/api/log-list').then(r => r.json()).then(logs => {
    const sel = document.getElementById('log-select');
    logs.forEach(l => {
      const opt = new Option(`${l.name}  (${fmtSize(l.size)}  ${l.mtime})`, l.path);
      sel.add(opt);
    });
  }).catch(() => {});
});

// ── Load from dropdown ────────────────────────────────────────────────────────
function loadSelected() {
  const path = document.getElementById('log-select').value;
  if (!path) return;
  _setFileInfo('Loading…');
  fetch('/api/parse-log', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ path }),
  }).then(r => r.json()).then(d => {
    if (!d.ok) { _setFileInfo('Error: ' + d.error); return; }
    _setFileInfo(path.split('/').pop() + ' — ' + d.total + ' findings');
    _ingest(d.findings);
  }).catch(e => _setFileInfo('Error: ' + e));
}

// ── Load from file upload ─────────────────────────────────────────────────────
function loadUploaded() {
  const input = document.getElementById('file-upload');
  const file  = input.files[0];
  if (!file) return;
  _setFileInfo('Uploading…');
  const form = new FormData();
  form.append('file', file);
  fetch('/api/parse-log', { method: 'POST', body: form })
    .then(r => r.json()).then(d => {
      if (!d.ok) { _setFileInfo('Error: ' + d.error); return; }
      _setFileInfo(file.name + ' — ' + d.total + ' findings');
      _ingest(d.findings);
    }).catch(e => _setFileInfo('Error: ' + e));
}

function _setFileInfo(msg) {
  document.getElementById('file-info').textContent = msg;
}

// ── Ingest parsed findings ────────────────────────────────────────────────────
function _ingest(findings) {
  allFindings = findings;
  knownHosts.clear(); knownShares.clear(); knownRules.clear();

  // Reset dropdowns
  ['host-filter','share-filter','rule-filter'].forEach(id => {
    const sel = document.getElementById(id);
    while (sel.options.length > 1) sel.remove(1);
  });

  findings.forEach(f => {
    if (f.host  && !knownHosts.has(f.host))   { knownHosts.add(f.host);   document.getElementById('host-filter').add(new Option(f.host, f.host)); }
    if (f.share && !knownShares.has(f.share)) { knownShares.add(f.share); document.getElementById('share-filter').add(new Option(f.share, f.share)); }
    if (f.rule_name && !knownRules.has(f.rule_name)) { knownRules.add(f.rule_name); document.getElementById('rule-filter').add(new Option(f.rule_name, f.rule_name)); }
  });

  updateCounts();
  document.getElementById('export-btn').disabled = false;
  applyFilters();
}

// ── Counts per rating ─────────────────────────────────────────────────────────
function updateCounts() {
  const counts = { All: allFindings.length, Black: 0, Red: 0, Yellow: 0, Green: 0 };
  allFindings.forEach(f => { if (counts[f.rating_label] !== undefined) counts[f.rating_label]++; });
  Object.entries(counts).forEach(([r, n]) => {
    const el = document.getElementById('cnt-' + r);
    if (el) el.textContent = n;
  });
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchRating(rating) {
  currentRating = rating;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.rating === rating);
  });
  applyFilters();
}

// ── Filtering ─────────────────────────────────────────────────────────────────
function scheduleFilter(immediate) {
  clearTimeout(filterTimer);
  filterTimer = setTimeout(applyFilters, immediate ? 0 : 150);
}

function applyFilters() {
  const text  = document.getElementById('search-input').value.toLowerCase();
  const host  = document.getElementById('host-filter').value;
  const share = document.getElementById('share-filter').value;
  const rule  = document.getElementById('rule-filter').value;

  let filtered = allFindings.filter(f => {
    if (currentRating !== 'All' && f.rating_label !== currentRating) return false;
    if (host  && f.host  !== host)  return false;
    if (share && f.share !== share) return false;
    if (rule  && f.rule_name !== rule) return false;
    if (text) {
      const hay = (f.unc_path + f.rule_name + f.matched_line + f.host + f.share).toLowerCase();
      if (!hay.includes(text)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => (RATING_ORDER[a.rating_label] ?? 9) - (RATING_ORDER[b.rating_label] ?? 9));

  document.getElementById('match-count').textContent = filtered.length + ' findings';
  renderFindings(filtered, text);
}

// ── Render finding cards ──────────────────────────────────────────────────────
function renderFindings(findings, searchTerm) {
  const container = document.getElementById('findings-container');

  if (allFindings.length === 0) {
    container.innerHTML = `
      <div id="empty-state">
        <div class="big-icon">&#x1F4C4;</div>
        <p>Load a log file above to view findings.</p>
        <p style="font-size:11px;color:var(--text-dim)">Supports ShareHunter and Snaffler log formats.</p>
      </div>`;
    return;
  }

  if (findings.length === 0) {
    container.innerHTML = `
      <div id="empty-state">
        <div class="big-icon">&#x1F50D;</div>
        <p>No findings match the current filters.</p>
      </div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  findings.forEach((f, idx) => {
    frag.appendChild(buildCard(f, idx, searchTerm));
  });
  container.innerHTML = '';
  container.appendChild(frag);
}

function buildCard(f, idx, searchTerm) {
  const card = document.createElement('div');
  card.className = `finding-card rating-${f.rating_label}`;

  // UNC path with colour segments
  const uncFormatted = formatUNC(f);

  // Matched content with optional highlight
  const matchRaw  = f.matched_line || '';
  const matchHtml = searchTerm
    ? highlightText(esc(matchRaw), searchTerm)
    : esc(matchRaw);

  const sizePart = f.size ? ` &bull; ${fmtSize(f.size)}` : '';
  const tsPart   = f.timestamp ? ` &bull; ${esc(f.timestamp)}` : '';
  const srcPart  = f.source ? ` &bull; <em>${esc(f.source)}</em>` : '';

  card.innerHTML = `
    <div class="card-header">
      <span class="badge badge-${f.rating_label}">${f.rating_label}</span>
      <span class="rule-tag">${esc(f.rule_name)}</span>
      <span class="unc-path">${uncFormatted}</span>
    </div>
    <div class="card-meta">
      <span>&#x1F5A5; ${esc(f.host || '—')}</span>
      <span>&#x1F4C2; ${esc(f.share || '—')}</span>
      <span>&#x1F4C4; ${esc(f.filename || '—')}</span>
      ${sizePart ? `<span>${sizePart}</span>` : ''}
      ${tsPart ? `<span>&#x1F552;${tsPart}</span>` : ''}
      ${srcPart ? `<span>${srcPart}</span>` : ''}
    </div>
    ${matchRaw ? `
    <div class="match-preview" id="mp-${idx}">${matchHtml}</div>
    <button class="expand-btn" id="eb-${idx}" onclick="toggleExpand(${idx}, event)">&#x25BC; Show more</button>
    ` : ''}
  `;

  card.onclick = (e) => {
    if (e.target.closest('.expand-btn') || e.target.closest('.match-preview')) return;
    showModal(f);
  };

  return card;
}

function formatUNC(f) {
  if (!f.unc_path) return '';
  const host  = esc(f.host);
  const share = esc(f.share);
  const path  = esc(f.path || '');
  return `<span class="host-part">\\\\${host}</span>\\<span class="share-part">${share}</span>${path ? '\\' + path : ''}`;
}

function toggleExpand(idx, e) {
  e.stopPropagation();
  const mp = document.getElementById('mp-' + idx);
  const eb = document.getElementById('eb-' + idx);
  if (!mp) return;
  const expanded = mp.classList.toggle('expanded');
  eb.innerHTML   = expanded ? '&#x25B2; Show less' : '&#x25BC; Show more';
}

// ── Highlight search term ─────────────────────────────────────────────────────
function highlightText(html, term) {
  if (!term) return html;
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return html.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

// ── Detail modal ──────────────────────────────────────────────────────────────
function showModal(f) {
  const rows = [
    ['Rating',        `<span class="badge badge-${f.rating_label}">${f.rating_label}</span>`],
    ['Rule',          esc(f.rule_name)],
    ['Host',          esc(f.host)],
    ['Share',         esc(f.share)],
    ['Path',          esc(f.path)],
    ['Filename',      esc(f.filename)],
    ['UNC Path',      esc(f.unc_path)],
    ['Size',          f.size ? fmtSize(f.size) : '—'],
    ['Timestamp',     esc(f.timestamp) || '—'],
    ['Source',        esc(f.source)],
  ];
  let html = `<table class="detail-table">` +
    rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('') +
    `</table>`;

  if (f.matched_line) {
    html += `<br>
      <strong style="color:var(--text-dim);font-size:11px">MATCHED CONTENT</strong>
      <div class="modal-match-box" id="modal-match">${esc(f.matched_line)}</div>
      <button class="copy-btn" onclick="copyMatch()">&#x1F4CB; Copy content</button>`;
  }
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay') || e.currentTarget.classList.contains('modal-close')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

function copyMatch() {
  const el = document.getElementById('modal-match');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.nextElementSibling;
    if (btn) { btn.textContent = '✓ Copied'; setTimeout(() => btn.innerHTML = '&#x1F4CB; Copy content', 1500); }
  });
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportCSV() {
  const cols = ['rating_label','host','share','path','filename','rule_name','size','timestamp','matched_line'];
  const header = cols.join(',');
  const rows = allFindings.map(f =>
    cols.map(c => '"' + String(f[c] ?? '').replace(/"/g, '""') + '"').join(',')
  );
  const blob = new Blob([header + '\n' + rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'snaffler_findings.csv';
  a.click();
}

// ── Clear ─────────────────────────────────────────────────────────────────────
function clearViewer() {
  allFindings = [];
  knownHosts.clear(); knownShares.clear(); knownRules.clear();
  ['host-filter','share-filter','rule-filter'].forEach(id => {
    const sel = document.getElementById(id);
    while (sel.options.length > 1) sel.remove(1);
  });
  updateCounts();
  document.getElementById('search-input').value = '';
  document.getElementById('match-count').textContent = '';
  document.getElementById('file-info').textContent = '';
  document.getElementById('export-btn').disabled = true;
  document.getElementById('log-select').value = '';
  document.getElementById('file-upload').value = '';
  document.getElementById('findings-container').innerHTML = `
    <div id="empty-state">
      <div class="big-icon">&#x1F4C4;</div>
      <p>Load a log file above to view findings.</p>
      <p style="font-size:11px;color:var(--text-dim)">Supports ShareHunter and Snaffler log formats.</p>
    </div>`;
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtSize(n) {
  if (!n) return '—';
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(1) + ' MB';
}

// Allow drag-and-drop onto the whole page
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  _setFileInfo('Uploading…');
  const form = new FormData();
  form.append('file', file);
  fetch('/api/parse-log', { method: 'POST', body: form })
    .then(r => r.json()).then(d => {
      if (!d.ok) { _setFileInfo('Error: ' + d.error); return; }
      _setFileInfo(file.name + ' — ' + d.total + ' findings');
      _ingest(d.findings);
    }).catch(e2 => _setFileInfo('Error: ' + e2));
});
</script>
