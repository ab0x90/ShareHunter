<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareHunter</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg:        #0d1117;
      --bg2:       #161b22;
      --bg3:       #21262d;
      --border:    #30363d;
      --text:      #c9d1d9;
      --text-dim:  #8b949e;
      --accent:    #58a6ff;
      --black-clr: #6e40c9;
      --red-clr:   #e74c3c;
      --yellow-clr:#e3b341;
      --green-clr: #3fb950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; }

    /* ── Top bar ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 18px; color: var(--accent); letter-spacing: 1px; }
    #status-badge {
      padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: bold; letter-spacing: .5px;
      background: var(--bg3); border: 1px solid var(--border);
    }
    #status-badge.running { background: #1c3a1c; border-color: var(--green-clr); color: var(--green-clr); }
    #status-badge.idle    { background: var(--bg3); border-color: var(--border); color: var(--text-dim); }
    #result-count { margin-left: auto; color: var(--text-dim); font-size: 12px; }

    /* ── Session resume banner ── */
    #session-banner {
      display: none;
      background: #1c2a3a;
      border-bottom: 1px solid var(--accent);
      padding: 10px 20px;
      font-size: 12px;
      color: var(--accent);
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    #session-banner.visible { display: flex; }
    #session-banner select {
      background: #0d1a27; border: 1px solid var(--accent);
      color: var(--accent); padding: 4px 8px; border-radius: 4px;
      font-family: inherit; font-size: 12px; min-width: 340px;
      cursor: pointer;
    }
    #session-banner select:focus { outline: none; }
    #session-banner button {
      padding: 4px 14px; border-radius: 4px; border: 1px solid var(--accent);
      background: #243545; color: var(--accent); cursor: pointer;
      font-family: inherit; font-size: 12px; font-weight: 600;
    }
    #session-banner button:hover { background: #2e4a60; }
    #session-banner .dismiss-btn {
      margin-left: auto; background: none; border-color: var(--border);
      color: var(--text-dim); font-weight: normal;
    }

    /* ── Tabs ── */
    .tab-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      padding: 0 20px;
    }
    .tab-btn {
      padding: 10px 20px; cursor: pointer;
      border: none; background: none; color: var(--text-dim);
      border-bottom: 2px solid transparent; font-size: 13px;
      font-family: inherit; transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { display: none; height: calc(100vh - 110px); }
    .tab-content.active { display: flex; flex-direction: column; }

    /* ── Scan form — single compact row ── */
    #scan-form {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex; flex-wrap: nowrap; gap: 6px; align-items: center;
    }
    /* thin text inputs, no labels — placeholders carry the hint */
    #scan-form input[type=text],
    #scan-form input[type=password],
    #scan-form input[type=number] {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 5px 7px; border-radius: 4px;
      font-family: inherit; font-size: 12px; height: 28px;
    }
    #scan-form input:focus { outline: none; border-color: var(--accent); }
    /* individual widths */
    #scan-form input[name=domain]        { width: 110px; }
    #scan-form input[name=username]      { width: 130px; }
    #scan-form input[name=password]      { width: 110px; padding-right: 26px; }
    #scan-form input[name=nthash]        { width: 100px; }
    #scan-form input[name=target]        { width: 160px; }
    #scan-form input[name=target_domain] { width: 160px; }
    #scan-form input[name=host_threads]  { width: 46px; }
    #scan-form input[name=share_threads] { width: 46px; }
    #scan-form input[name=depth]         { width: 46px; }
    /* divider between logical groups */
    .sf-sep {
      width: 1px; height: 22px; background: var(--border);
      flex-shrink: 0; margin: 0 2px;
    }
    /* password eye */
    .pw-wrap { position: relative; display: flex; align-items: center; }
    .pw-eye {
      position: absolute; right: 5px; cursor: pointer;
      color: var(--text-dim); font-size: 12px; user-select: none;
      background: none; border: none; padding: 0; line-height: 1;
    }
    .pw-eye:hover { color: var(--text); }
    /* radio-style target mode — tiny pill toggles */
    .mode-toggle { display: flex; gap: 0; flex-shrink: 0; }
    .mode-toggle label {
      padding: 4px 9px; font-size: 11px; cursor: pointer;
      border: 1px solid var(--border); color: var(--text-dim);
      background: var(--bg3); white-space: nowrap;
      transition: background .1s, color .1s;
    }
    .mode-toggle label:first-child { border-radius: 4px 0 0 4px; }
    .mode-toggle label:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
    .mode-toggle input[type=radio] { display: none; }
    .mode-toggle input[type=radio]:checked + span {
      /* handled via JS class on label */
    }
    .mode-toggle label.checked { background: #1c2a3a; border-color: var(--accent); color: var(--accent); }
    /* advanced-auth gear panel */
    #adv-toggle {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--text-dim); padding: 4px 7px; cursor: pointer;
      font-size: 13px; line-height: 1; height: 28px; flex-shrink: 0;
    }
    #adv-toggle:hover, #adv-toggle.open { color: var(--accent); border-color: var(--accent); }
    #adv-panel {
      display: none; position: absolute; top: 100%; left: 0; right: 0;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 8px 16px; gap: 10px; align-items: center; flex-wrap: wrap;
      z-index: 10;
    }
    #adv-panel.open { display: flex; }
    #adv-panel input[type=text] {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 5px 7px; border-radius: 4px;
      font-family: inherit; font-size: 12px; height: 28px; width: 180px;
    }
    #adv-panel input[type=text]:focus { outline: none; border-color: var(--accent); }
    #adv-panel input[name=dc_ip] { width: 140px; }
    .adv-check {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-dim); cursor: pointer;
      white-space: nowrap; user-select: none;
    }
    .adv-check input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
    .adv-check:hover { color: var(--text); }
    .adv-label { font-size: 11px; color: var(--text-dim); }
    /* wrap the form + adv panel together so adv-panel can position relative to form */
    #form-wrap { position: relative; }
    button.btn {
      padding: 6px 16px; border-radius: 4px; border: 1px solid;
      cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
    }
    .btn-start { background: #1c3a1c; border-color: var(--green-clr); color: var(--green-clr); }
    .btn-start:hover { background: #2a552a; }
    .btn-stop  { background: #3a1c1c; border-color: var(--red-clr); color: var(--red-clr); }
    .btn-stop:hover { background: #552a2a; }
    .btn-clear { background: var(--bg3); border-color: var(--border); color: var(--text-dim); }
    .btn-clear:hover { border-color: var(--text-dim); }

    /* ── Live tab ── */
    #log-area {
      flex: 1; overflow-y: auto; padding: 10px 20px;
      font-size: 12px; line-height: 1.6;
    }
    .log-entry { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
    .log-entry.result { color: var(--text); }
    .log-entry.info   { color: var(--text-dim); }
    .log-entry.error  { color: var(--red-clr); }
    .log-entry.warn   { color: var(--yellow-clr); }
    .rating-Black  { color: var(--black-clr); font-weight: bold; }
    .rating-Red    { color: var(--red-clr);   font-weight: bold; }
    .rating-Yellow { color: var(--yellow-clr);}
    .rating-Green  { color: var(--green-clr); }

    /* ── Results table (filter tab) ── */
    #filter-bar {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    #filter-bar input, #filter-bar select {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 5px 8px; border-radius: 4px;
      font-family: inherit; font-size: 12px;
    }
    #filter-bar input { width: 240px; }
    #filter-bar input:focus, #filter-bar select:focus { outline: none; border-color: var(--accent); }
    .rating-pills { display: flex; gap: 6px; }
    .pill {
      padding: 3px 10px; border-radius: 12px; cursor: pointer;
      font-size: 11px; font-weight: bold; border: 2px solid transparent;
      opacity: 0.4; transition: opacity .15s, border-color .15s;
    }
    .pill.active { opacity: 1; }
    .pill-Black  { background: #2a1f45; border-color: var(--black-clr); color: var(--black-clr); }
    .pill-Red    { background: #3a1c1c; border-color: var(--red-clr);   color: var(--red-clr);   }
    .pill-Yellow { background: #3a2f10; border-color: var(--yellow-clr);color: var(--yellow-clr);}
    .pill-Green  { background: #1c3a1c; border-color: var(--green-clr); color: var(--green-clr); }

    /* ── Virtual-scroll result list ── */
    #results-table-wrap {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      padding: 0 20px 10px;
    }
    /* Fixed header row */
    #vt-header {
      display: grid;
      grid-template-columns: 72px 150px 100px 300px 1fr 120px 60px 120px 88px;
      background: var(--bg2); border-bottom: 2px solid var(--border);
      padding-right: 8px; /* offset for scrollbar */
      flex-shrink: 0;
    }
    #vt-header div {
      padding: 8px 10px; font-size: 11px; color: var(--text-dim);
      white-space: nowrap; cursor: pointer; user-select: none;
      overflow: hidden; text-overflow: ellipsis;
    }
    #vt-header div:hover { color: var(--text); }
    #vt-header div.sorted { color: var(--accent); }
    /* Scrollable viewport */
    #vt-scroll {
      flex: 1; overflow-y: scroll; position: relative;
    }
    /* Total-height sentinel — sets scrollbar size */
    #vt-sizer { position: absolute; top: 0; left: 0; width: 1px; }
    /* Row container — positioned inside scroll viewport */
    #vt-rows { position: absolute; top: 0; left: 0; right: 0; }
    .vt-row {
      display: grid;
      grid-template-columns: 72px 150px 100px 300px 1fr 120px 60px 120px 88px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      height: 78px;        /* fixed — every row identical height (3 lines) */
      overflow: hidden;
    }
    .vt-row:hover > div { background: var(--bg2); }
    .vt-row > div {
      padding: 5px 10px; font-size: 12px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      align-self: center;
    }
    .vt-row > div.td-data {
      font-size: 11px; color: var(--text-dim);
      white-space: pre-wrap; word-break: break-all;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      align-self: center;
      padding: 6px 10px;
    }
    .dl-btn {
      background: #1c2a3a; border: 1px solid var(--accent); color: var(--accent);
      padding: 3px 8px; border-radius: 4px; cursor: pointer;
      font-size: 11px; font-family: inherit; white-space: nowrap;
    }
    .dl-btn:hover { background: #243545; }
    .dl-btn:disabled { opacity: .4; cursor: default; }
    .dl-btn.done {
      border-color: var(--green-clr) !important;
      color: var(--green-clr) !important;
    }
    .dl-btn.err {
      border-color: var(--red-clr) !important;
      color: var(--red-clr) !important;
    }
    .badge {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 10px; font-weight: bold;
    }
    .badge-Black  { background: #2a1f45; color: var(--black-clr); }
    .badge-Red    { background: #3a1c1c; color: var(--red-clr);   }
    .badge-Yellow { background: #3a2f10; color: var(--yellow-clr);}
    .badge-Green  { background: #1c3a1c; color: var(--green-clr); }

    /* ── Detail modal ── */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 20px; max-width: 760px; width: 90%;
      max-height: 80vh; overflow-y: auto;
    }
    #modal h2 { font-size: 14px; color: var(--accent); margin-bottom: 12px; }
    #modal table { font-size: 12px; }
    #modal td:first-child { color: var(--text-dim); width: 150px; padding-right: 12px; white-space: nowrap; }
    #modal .close-btn {
      float: right; background: none; border: none; color: var(--text-dim);
      font-size: 18px; cursor: pointer; padding: 0 4px;
    }
    #modal .close-btn:hover { color: var(--text); }
    #modal .match-box {
      background: var(--bg3); border: 1px solid var(--border);
      padding: 8px 12px; border-radius: 4px; font-size: 12px;
      white-space: pre-wrap; word-break: break-all; margin-top: 6px;
    }

    /* ── Export button ── */
    .btn-export { background: var(--bg3); border-color: var(--border); color: var(--accent); }
    .btn-export:hover { border-color: var(--accent); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>&#x1F50D; ShareHunter</h1>
  <span id="status-badge" class="idle">IDLE</span>
  <span id="result-count">0 findings</span>
  <a href="/log-viewer" style="margin-left:auto;color:var(--text-dim);text-decoration:none;font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;" onmouseover="this.style.color='var(--accent)';this.style.borderColor='var(--accent)'" onmouseout="this.style.color='var(--text-dim)';this.style.borderColor='var(--border)'">&#x1F4C4; Log Viewer</a>
</header>

<!-- Session resume banner (shown on GUI-only startup when sessions exist) -->
<div id="session-banner">
  <span style="font-weight:600;white-space:nowrap">&#x1F4BE; Prior session:</span>
  <select id="session-select" title="Select a session to resume"></select>
  <button onclick="resumeSession()">&#x21BA; Resume</button>
  <button class="dismiss-btn" onclick="dismissBanner()">&#x2715;</button>
</div>

<!-- Tab bar -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('live')">Live Output</button>
  <button class="tab-btn" onclick="switchTab('filter')">Filter Results</button>
</div>

<!-- ═══ LIVE TAB ═══ -->
<div id="tab-live" class="tab-content active">
  <div id="form-wrap">
    <!-- Single compact row -->
    <div id="scan-form">
      <!-- Target mode pill toggle -->
      <div class="mode-toggle" id="mode-toggle">
        <label id="lbl-specific" class="checked" title="Scan a specific IP, CIDR, hostname, or file of targets">
          <input type="radio" name="target_mode" value="specific" checked onchange="toggleTargetMode()">
          <span>Host/CIDR</span>
        </label>
        <label id="lbl-domain" title="Enumerate all computers from a DC via LDAP, then scan them all">
          <input type="radio" name="target_mode" value="domain" onchange="toggleTargetMode()">
          <span>Domain enum</span>
        </label>
      </div>
      <!-- Target inputs — only one visible at a time -->
      <input type="text" name="target"        id="inp-target"        placeholder="IP / CIDR / host / file">
      <input type="text" name="target_domain" id="inp-target-domain" placeholder="DC hostname or IP" style="display:none">

      <div class="sf-sep"></div>

      <!-- Credentials -->
      <input type="text"     name="domain"   placeholder="Domain"   title="Domain (CORP or corp.local)" oninput="onCredChange()">
      <input type="text"     name="username" placeholder="Username"  title="Username — DOMAIN\user or user@domain.tld triggers auto-fill" oninput="onCredChange()">
      <div class="pw-wrap">
        <input type="password" name="password" placeholder="Password" title="Password" autocomplete="current-password">
        <button type="button" class="pw-eye" onclick="togglePw(this)" title="Show/hide">&#x1F441;</button>
      </div>
      <input type="password" name="nthash"   placeholder="NT hash"   title="NT hash for pass-the-hash (optional)" autocomplete="off">

      <div class="sf-sep"></div>

      <!-- Thread / depth knobs -->
      <input type="number" name="host_threads"  value="5"  min="1" max="50" title="Concurrent hosts">
      <input type="number" name="share_threads" value="10" min="1" max="50" title="Concurrent shares/host">
      <input type="number" name="depth"         value="10" min="1" max="30" title="Max directory depth">

      <div class="sf-sep"></div>

      <!-- Actions + advanced gear -->
      <button class="btn btn-start" onclick="startScan()">&#x25B6; Start</button>
      <button class="btn btn-stop"  onclick="stopScan()">&#x25A0; Stop</button>
      <button class="btn btn-clear" onclick="clearLog()" title="Clear log">&#x1F5D1;</button>
      <button id="adv-toggle" onclick="toggleAdv()" title="Advanced auth options">&#x2699;</button>
    </div>

    <!-- Advanced auth panel — hidden until gear clicked -->
    <div id="adv-panel">
      <span class="adv-label">Advanced auth:</span>
      <label class="adv-check" title="Force LDAPS (port 636, TLS). Default: try plain LDAP first, auto-fall back to LDAPS.">
        <input type="checkbox" name="ldaps" id="chk-ldaps"> LDAPS
      </label>
      <label class="adv-check" title="Kerberos (SASL/GSSAPI) for LDAP + SMB. Needs a ccache or creds above.">
        <input type="checkbox" name="kerberos" id="chk-kerberos" onchange="onKerberosChange()"> Kerberos
      </label>
      <input type="text" name="aes_key" id="inp-aes-key" placeholder="AES key (hex, implies Kerberos)" autocomplete="off" style="display:none">
      <input type="text" name="dc_ip"   placeholder="DC IP (optional pin / KDC)" title="Pin a specific DC IP, required for Kerberos when DNS is unavailable">
    </div>
  </div>

  <!-- Log stream -->
  <div id="log-area"></div>
</div>

<!-- ═══ FILTER TAB ═══ -->
<div id="tab-filter" class="tab-content">
  <div id="filter-bar">
    <input type="text" id="filter-text" placeholder="Search path, filename, match, rule…" oninput="scheduleFilter()">
    <select id="filter-share" onchange="scheduleFilter(true)">
      <option value="">All Shares</option>
    </select>
    <select id="filter-host" onchange="scheduleFilter(true)">
      <option value="">All Hosts</option>
    </select>
    <div class="rating-pills">
      <div class="pill pill-Black active"  data-rating="Black"  onclick="togglePill(this)">Black</div>
      <div class="pill pill-Red active"    data-rating="Red"    onclick="togglePill(this)">Red</div>
      <div class="pill pill-Yellow active" data-rating="Yellow" onclick="togglePill(this)">Yellow</div>
      <div class="pill pill-Green active"  data-rating="Green"  onclick="togglePill(this)">Green</div>
    </div>
    <button class="btn btn-export" onclick="exportCSV()">&#x2B07; CSV</button>
    <span id="filter-count" style="color:var(--text-dim);font-size:12px;margin-left:auto"></span>
  </div>
  <div id="results-table-wrap">
    <div id="vt-header">
      <div onclick="sortBy('rating_label')" data-col="rating_label">Rating <span class="sort-arrow">▲</span></div>
      <div onclick="sortBy('host')"         data-col="host">Host <span class="sort-arrow">▲</span></div>
      <div onclick="sortBy('share')"        data-col="share">Share <span class="sort-arrow">▲</span></div>
      <div onclick="sortBy('path')"         data-col="path">Path <span class="sort-arrow">▲</span></div>
      <div>Matched Data</div>
      <div onclick="sortBy('rule_name')"    data-col="rule_name">Rule <span class="sort-arrow">▲</span></div>
      <div onclick="sortBy('size')"         data-col="size">Size <span class="sort-arrow">▲</span></div>
      <div onclick="sortBy('modified')"     data-col="modified">Modified <span class="sort-arrow">▲</span></div>
      <div>Download</div>
    </div>
    <div id="vt-scroll">
      <div id="vt-sizer"></div>
      <div id="vt-rows"></div>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <button class="close-btn" onclick="closeModal()">&#x2715;</button>
    <h2>Finding Detail</h2>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const socket = io();
let allResults = [];
let sortCol    = 'rating_label';
let sortAsc    = true;
const RATING_ORDER = { Black: 0, Red: 1, Yellow: 2, Green: 3 };

// Persistent download state: unc_path -> { state: 'done'|'err', msg: '' }
// Survives renderTable() calls and tab switches within the same page session.
// On reload, /api/results annotates results with downloaded:true so we
// rebuild this map from server state.
const _dlState = new Map();

// ── Polling fallback (works over SSH tunnels where WS events are lost) ─────
let _pollInterval      = null;
let _logOffset         = 0;
let _wsWorking         = false;   // set true if WS actually delivers a result/log
// Tracks how many results the SERVER currently holds for the active scan.
// Separate from allResults.length because allResults may include historical
// results loaded from a prior session file.
let _serverResultCount = 0;
let _currentScanId = null;

function _mergePolledResults(payload) {
  const scan_id = payload.scan_id ?? null;
  const data    = payload.results ?? payload; // fallback if old format

  // Detect a genuinely new scan by scan_id change
  if (scan_id !== null && scan_id !== _currentScanId && _currentScanId !== null) {
    allResults = [];
    _dlState.clear();
    _filteredRows = [];
    _knownHosts.clear();
    _knownShares.clear();
    _serverResultCount = 0;
    clearLog();
    document.getElementById('vt-rows').innerHTML = ''; document.getElementById('vt-sizer').style.height = '0px';
    ['filter-host','filter-share'].forEach(id => {
      const sel = document.getElementById(id);
      while (sel.options.length > 1) sel.remove(1);
    });
    addLog('[*] New scan detected — display reset', 'info');
  }
  if (scan_id !== null) _currentScanId = scan_id;

  const newItems = data.slice(_serverResultCount);
  _serverResultCount = data.length;

  newItems.forEach(r => {
    if (_dlState.has(r.unc_path)) { r.downloaded = true; r.local_path = _dlState.get(r.unc_path).local_path || ''; }
    allResults.push(r);
    addResultToLog(r);
    updateFilterDropdowns(r);
  });
  if (newItems.length) {
    updateCount();
    if (document.getElementById('tab-filter').classList.contains('active')) scheduleFilter();
  }
}

function startPolling() {
  if (_pollInterval) return;
  _pollInterval = setInterval(() => {
    fetch('/api/status').then(r => r.json()).then(d => {
      setStatus(d.running);
      if (!d.running) stopPolling();
    }).catch(() => {});

    fetch('/api/results').then(r => r.json()).then(data => {
      _mergePolledResults(data);
    }).catch(() => {});

    fetch('/api/logs').then(r => r.json()).then(logs => {
      logs.slice(_logOffset).forEach(l => { if (l.level !== 'result') addLog(l.msg, l.level); });
      _logOffset = logs.length;
    }).catch(() => {});
  }, 2500);
}

function stopPolling() {
  if (!_pollInterval) return;
  clearInterval(_pollInterval);
  _pollInterval = null;
}

// ── Socket events ──────────────────────────────────────────────────────────
socket.on('connect',    () => addLog('[WS] Connected to ShareHunter', 'info'));
socket.on('disconnect', () => addLog('[WS] Disconnected', 'error'));

socket.on('log', d => { _wsWorking = true; addLog(d.msg, d.level); });

socket.on('new_result', r => {
  _wsWorking = true;
  // Annotate from persistent dl state before pushing
  if (_dlState.has(r.unc_path)) {
    r.downloaded  = true;
    r.local_path  = _dlState.get(r.unc_path).local_path || '';
  }
  allResults.push(r);
  addResultToLog(r);
  updateCount();
  updateFilterDropdowns(r);
  if (document.getElementById('tab-filter').classList.contains('active')) {
    scheduleFilter();
  }
});

socket.on('scan_done', d => {
  stopPolling();
  setStatus(false);
  addLog(`[✓] Scan finished — ${d.total} finding(s)`, 'info');
});

// ── Auto-fill target fields from credentials ───────────────────────────────
// Rules:
//   - If username contains '\' (e.g. CORP\alice) or '@' (alice@corp.local),
//     extract and fill the Domain field if empty.
//   - If domain looks like a FQDN (has dots), auto-select Domain enum mode
//     and fill the DC field with "dc.<domain>" if still empty.
//   - If domain is a NETBIOS short name (no dots), stay on Specific mode.
function onCredChange() {
  const userEl = document.querySelector('[name=username]');
  const domEl  = document.querySelector('[name=domain]');
  const dcEl   = document.getElementById('inp-target-domain');

  let user = userEl.value.trim();
  let dom  = domEl.value.trim();

  // Extract domain from DOMAIN\user or user@domain.tld
  let derived = '';
  if (user.includes('\\'))     derived = user.split('\\')[0];
  else if (user.includes('@')) derived = user.split('@')[1];

  if (derived && !dom) {
    domEl.value = derived;
    dom = derived;
  }

  if (!dom) return;

  // Only auto-switch to domain-enum and suggest DC if the domain looks like
  // a valid FQDN (at least two non-empty labels, no trailing dot) AND the
  // user hasn't already entered a target in the host/CIDR field.
  const domParts = dom.replace(/\.$/, '').split('.');
  const isFQDN   = domParts.length >= 2 && domParts.every(p => p.length > 0);
  const hostVal  = document.querySelector('[name=target]')?.value?.trim() || '';

  if (isFQDN && !hostVal) {
    // FQDN domain with no host/CIDR target → switch to domain-enum mode
    const radio = document.querySelector('input[name=target_mode][value=domain]');
    if (!radio.checked) { radio.checked = true; toggleTargetMode(); }
    if (!dcEl.value.trim()) {
      dcEl.value = 'dc01.' + dom.toLowerCase().replace(/\.$/, '');
      dcEl.style.borderColor = 'var(--accent)';
      setTimeout(() => { dcEl.style.borderColor = ''; }, 1200);
    }
  }
  // short NETBIOS name or host/CIDR already set → leave mode alone
}

function startScan() {
  const mode     = document.querySelector('input[name=target_mode]:checked').value;
  const kerberos = document.getElementById('chk-kerberos').checked;
  const aesKey   = getFormVal('aes_key').trim();

  // If CLI set the password/hash and the user left the field blank,
  // send a sentinel so the server uses its in-memory value.
  const pwEl = document.querySelector('[name=password]');
  const nhEl = document.querySelector('[name=nthash]');
  const pwVal = pwEl.value || (pwEl.dataset.cliSet ? '__CLI__' : '');
  const nhVal = nhEl.value || (nhEl.dataset.cliSet ? '__CLI__' : '');

  const payload = {
    target:        mode === 'specific' ? getFormVal('target')        : '',
    target_domain: mode === 'domain'   ? getFormVal('target_domain') : '',
    domain:        getFormVal('domain'),
    username:      getFormVal('username'),
    password:      pwVal,
    nthash:        nhVal,
    ldaps:         document.getElementById('chk-ldaps').checked,
    kerberos:      kerberos || !!aesKey,
    aes_key:       aesKey,
    dc_ip:         getFormVal('dc_ip').trim(),
    host_threads:  parseInt(getFormVal('host_threads'))  || 5,
    share_threads: parseInt(getFormVal('share_threads')) || 10,
    depth:         parseInt(getFormVal('depth'))         || 10,
  };

  const displayTarget = mode === 'domain'
    ? `domain enum via ${payload.target_domain}`
    : payload.target;

  allResults = [];
  _dlState.clear();
  _filteredRows = [];
  _knownHosts.clear();
  _knownShares.clear();
  updateCount();
  clearLog();
  document.getElementById('vt-rows').innerHTML = ''; document.getElementById('vt-sizer').style.height = '0px';
  ['filter-host','filter-share'].forEach(id => {
    const sel = document.getElementById(id);
    while (sel.options.length > 1) sel.remove(1);
  });
  dismissBanner();

  fetch('/api/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload),
  }).then(r => r.json()).then(d => {
    if (d.ok) {
      setStatus(true);
      addLog(`[*] Scan started → ${displayTarget}`, 'info');
      startPolling();
    } else {
      addLog('[!] ' + d.error, 'error');
    }
  });
}

function stopScan() {
  fetch('/api/stop', { method: 'POST' }).then(() => {
    stopPolling();
    setStatus(false);
    addLog('[*] Stop requested', 'warn');
  });
}

// ── Session banner ─────────────────────────────────────────────────────────
function dismissBanner() {
  document.getElementById('session-banner').classList.remove('visible');
}

function _fmtSession(s) {
  const dt  = s.started_at ? s.started_at.replace('T', ' ').slice(0, 16) : '?';
  const who = s.username   ? s.username + '@'                              : '';
  const tgt = s.target     || '?';
  const end = s.ended_at   ? '' : ' [incomplete]';
  return `${dt}  ${who}${tgt}  — ${s.result_count} result(s)${end}`;
}

function showSessionBanner(sessions) {
  if (!sessions.length) return;
  const sel = document.getElementById('session-select');
  sel.innerHTML = '';
  sessions.forEach(s => {
    const opt = new Option(_fmtSession(s), s.scan_id);
    sel.add(opt);
  });
  document.getElementById('session-banner').classList.add('visible');
}

function resumeSession() {
  const scan_id = document.getElementById('session-select').value;
  dismissBanner();

  allResults = [];
  _dlState.clear();
  _filteredRows = [];
  _knownHosts.clear();
  _knownShares.clear();
  updateCount();
  clearLog();
  document.getElementById('vt-rows').innerHTML = ''; document.getElementById('vt-sizer').style.height = '0px';
  ['filter-host','filter-share'].forEach(id => {
    const sel = document.getElementById(id);
    while (sel.options.length > 1) sel.remove(1);
  });

  fetch('/api/session-resume', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ scan_id }),
  }).then(r => r.json()).then(d => {
    if (!d.ok) { addLog('[!] Resume failed: ' + d.error, 'error'); return; }

    Object.entries(d.downloads || {}).forEach(([unc, info]) => {
      _dlState.set(unc, { state: 'done', local_path: info.local_path || '' });
    });

    allResults = (d.results || []).map(r => {
      if (_dlState.has(r.unc_path)) {
        r.downloaded = true;
        r.local_path = _dlState.get(r.unc_path).local_path || '';
      }
      return r;
    });

    // Batch log entries — don't hammer the DOM with thousands of individual appends
    const logArea = document.getElementById('log-area');
    const frag = document.createDocumentFragment();
    allResults.forEach(r => {
      updateFilterDropdowns(r);
      const div = document.createElement('div');
      div.className = 'log-entry result';
      const span = document.createElement('span');
      span.className = 'rating-' + r.rating_label;
      span.textContent = '[' + r.rating_label + ']';
      const rest = document.createElement('span');
      const matchPart = r.matched_line ? `[${r.matched_line.substring(0,200)}]` : '';
      rest.textContent = `(${r.rule_name})<${r.size}B>{\\\\${r.host}\\${r.share}\\${r.path}}${matchPart}`;
      div.appendChild(span); div.appendChild(rest);
      frag.appendChild(div);
    });
    logArea.appendChild(frag);
    logArea.scrollTop = logArea.scrollHeight;
    updateCount();

    // _serverResultCount = how many results the server currently holds for this scan.
    // The poll will slice from this offset so only NEW results get appended to the display.
    _serverResultCount = allResults.length;
    _logOffset = 0;

    if (d.resuming) {
      addLog(`[✓] Session loaded — ${allResults.length} prior result(s). Resuming scan against ${d.pending} pending host(s)…`, 'info');
      setStatus(true);
    } else if (d.live) {
      addLog(`[✓] Synced live scan — ${allResults.length} result(s) so far`, 'info');
      setStatus(true);
    } else {
      addLog(`[✓] Session loaded — ${allResults.length} result(s). All hosts completed.`, 'info');
      setStatus(false);
    }
    stopPolling();
    startPolling();
  });
}

// ── Filter tab ─────────────────────────────────────────────────────────────
const activePills = new Set(['Black', 'Red', 'Yellow', 'Green']);

// Virtual scroll state
let _filteredRows  = [];    // current filtered+sorted result set
const _rowHeight   = 78;    // must match .vt-row height in CSS — never changes
let _filterTimer   = null;  // debounce handle

const _knownHosts  = new Set();
const _knownShares = new Set();

function togglePill(el) {
  const r = el.dataset.rating;
  if (activePills.has(r)) { activePills.delete(r); el.classList.remove('active'); }
  else                     { activePills.add(r);    el.classList.add('active');   }
  scheduleFilter();
}

function updateFilterDropdowns(r) {
  const hostSel  = document.getElementById('filter-host');
  const shareSel = document.getElementById('filter-share');
  if (!_knownHosts.has(r.host))   { _knownHosts.add(r.host);   hostSel.add(new Option(r.host, r.host)); }
  if (!_knownShares.has(r.share)) { _knownShares.add(r.share); shareSel.add(new Option(r.share, r.share)); }
}

function scheduleFilter(immediate) {
  clearTimeout(_filterTimer);
  _filterTimer = setTimeout(applyFilters, immediate ? 0 : 120);
}

function applyFilters() {
  const text  = document.getElementById('filter-text').value.toLowerCase();
  const host  = document.getElementById('filter-host').value;
  const share = document.getElementById('filter-share').value;

  _filteredRows = allResults.filter(r => {
    if (!activePills.has(r.rating_label)) return false;
    if (host  && r.host  !== host)  return false;
    if (share && r.share !== share) return false;
    if (text) {
      const haystack = (r.path + r.filename + r.matched_line + r.rule_name + r.rule_desc).toLowerCase();
      if (!haystack.includes(text)) return false;
    }
    return true;
  });

  _filteredRows.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (sortCol === 'rating_label') { av = RATING_ORDER[av] ?? 99; bv = RATING_ORDER[bv] ?? 99; }
    if (typeof av === 'number') return sortAsc ? av - bv : bv - av;
    av = String(av); bv = String(bv);
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  document.getElementById('filter-count').textContent = _filteredRows.length + ' rows';
  _visibleStart = 0;
  renderVirtualTable();
}

// ── Virtual table renderer ─────────────────────────────────────────────────
// Instead of inserting N thousand <tr> elements, we render only the slice
// visible in the viewport plus a small overscan, and use spacer rows above
// and below to maintain correct scrollbar size.

const _dlRegistry = [];

function _buildRow(r) {
  const dataText = r.matched_line
    ? r.matched_line.substring(0, 600) + (r.matched_line.length > 600 ? '…' : '')
    : '';
  const dlInfo   = _dlState.get(r.unc_path);
  const isDone   = dlInfo && dlInfo.state === 'done';
  const isErr    = dlInfo && dlInfo.state === 'err';
  const btnClass = isDone ? 'dl-btn done' : (isErr ? 'dl-btn err' : 'dl-btn');
  const btnLabel = isDone ? '✓ Got' : (isErr ? '⚠ Err' : '↓ Get');
  const btnTitle = isErr  ? esc(dlInfo.msg || '') : (isDone ? esc(dlInfo.local_path || '') : '');

  const row = document.createElement('div');
  row.className = 'vt-row';
  row.innerHTML = `
    <div><span class="badge badge-${esc(r.rating_label)}">${esc(r.rating_label)}</span></div>
    <div title="${esc(r.host)}">${esc(r.host)}</div>
    <div title="${esc(r.share)}">${esc(r.share)}</div>
    <div title="${esc(r.path)}">${esc(r.path)}</div>
    <div class="td-data">${esc(dataText)}</div>
    <div title="${esc(r.rule_desc)}">${esc(r.rule_name)}</div>
    <div>${fmtSize(r.size)}</div>
    <div>${esc(r.modified)}</div>
    <div><button class="${btnClass}" title="${btnTitle}" ${isDone ? 'disabled' : ''}>${btnLabel}</button></div>
  `;
  row.onclick = (e) => { if (!e.target.closest('.dl-btn')) showModal(r); };
  const btn = row.querySelector('.dl-btn');
  if (btn && !isDone) {
    btn.addEventListener('click', (e) => { e.stopPropagation(); downloadFile(btn, r); });
  }
  return row;
}

function renderVirtualTable() {
  const scroller = document.getElementById('vt-scroll');
  const sizer    = document.getElementById('vt-sizer');
  const rowsEl   = document.getElementById('vt-rows');
  const total    = _filteredRows.length;

  _dlRegistry.length = 0;
  _filteredRows.forEach(r => _dlRegistry.push(r));

  if (total === 0) {
    sizer.style.height = '0px';
    rowsEl.innerHTML   = '';
    rowsEl.style.top   = '0px';
    return;
  }

  // Total scroll height — gives the scrollbar the right size
  sizer.style.height = (total * _rowHeight) + 'px';

  const scrollTop  = scroller.scrollTop;
  const viewHeight = scroller.clientHeight;
  const overscan   = 5;
  const startIdx   = Math.max(0, Math.floor(scrollTop / _rowHeight) - overscan);
  const endIdx     = Math.min(total, Math.ceil((scrollTop + viewHeight) / _rowHeight) + overscan);

  // Position the row container at the pixel offset of the first rendered row
  rowsEl.style.top = (startIdx * _rowHeight) + 'px';

  const frag = document.createDocumentFragment();
  for (let i = startIdx; i < endIdx; i++) {
    frag.appendChild(_buildRow(_filteredRows[i]));
  }
  rowsEl.innerHTML = '';
  rowsEl.appendChild(frag);
}

// Scroll listener — plain scroll event on the dedicated scroll div, no jank
document.addEventListener('DOMContentLoaded', () => {
  let _raf = null;
  document.getElementById('vt-scroll').addEventListener('scroll', () => {
    if (_raf) return;
    _raf = requestAnimationFrame(() => { _raf = null; renderVirtualTable(); });
  });
});

function downloadFile(btn, r) {
  btn.disabled    = true;
  btn.textContent = '…';

  fetch('/api/download', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ host: r.host, share: r.share, path: r.path, filename: r.filename }),
  }).then(resp => {
    if (!resp.ok) {
      return resp.json().then(d => { throw new Error(d.error || resp.statusText); });
    }
    const cd    = resp.headers.get('Content-Disposition') || '';
    const match = cd.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
    const fname = match ? match[1].replace(/['"]/g, '') : r.filename;
    return resp.blob().then(blob => ({ blob, fname }));
  }).then(({ blob, fname }) => {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href    = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Record in durable state map
    _dlState.set(r.unc_path, { state: 'done', local_path: '' });

    btn.innerHTML           = '&#x2713; Got';
    btn.className           = 'dl-btn done';
    btn.disabled            = true;
  }).catch(err => {
    // Record error in durable state so re-renders show the error
    _dlState.set(r.unc_path, { state: 'err', msg: err.message });

    btn.disabled  = false;
    btn.innerHTML = '&#x26A0; Err';
    btn.className = 'dl-btn err';
    btn.title     = err.message;
    console.error('Download failed:', err);
  });
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  document.querySelectorAll('#vt-header div[data-col]').forEach(el => {
    el.classList.toggle('sorted', el.dataset.col === col);
    const arrow = el.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = (el.dataset.col === col && !sortAsc) ? '▼' : '▲';
  });
  applyFilters();
}

  const body = document.getElementById('modal-body');

    ['Rule',      esc(r.rule_name)],
    ['Rule Desc', esc(r.rule_desc)],
    ['Match Type',esc(r.match_type)],
    ['Host',      esc(r.host)],
    ['Share',     esc(r.share)],
    ['UNC Path',  esc(r.unc_path)],
    ['Size',      fmtSize(r.size)],
    ['Modified',  esc(r.modified)],
    ['Detected',  esc(r.timestamp)],

  let html = '<table>' + rows.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('') + '</table>';

// ── Export ─────────────────────────────────────────────────────────────────
function exportCSV() {
  const cols = ['rating_label','host','share','path','filename','size','modified','rule_name','rule_desc','match_type','matched_line'];
  const header = cols.join(',');
  const rows = allResults.map(r =>
    cols.map(c => '"' + String(r[c] ?? '').replace(/"/g,'""') + '"').join(',')
  );
  const blob = new Blob([header + '\n' + rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sharehunter_results.csv';
  a.click();
}

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtSize(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(1) + ' MB';
}

// ── On load: show session picker only when GUI started with no credentials ──
// "No credentials" = no scan running and no results already in memory,
// which is the state when launched as: python sharehunter.py (no -t/-u).
// If a CLI scan is already running, the status poll will pick that up and
// startPolling() will begin — no need to show old sessions.

// ── Prefill form from CLI args ─────────────────────────────────────────────
function prefillForm(d) {
  if (!d.ok) return;

  // Credentials
  if (d.username) document.querySelector('[name=username]').value = d.username;
  if (d.domain)   document.querySelector('[name=domain]').value   = d.domain;
  // Password/hash: server only tells us whether they exist, doesn't send the value.
  // Show a placeholder that makes clear the credential is loaded server-side.
  if (d.has_password) {
    const pw = document.querySelector('[name=password]');
    pw.placeholder = '(set via CLI)';
    pw.dataset.cliSet = '1';   // flag so startScan knows not to send blank
  }
  if (d.has_nthash) {
    const nh = document.querySelector('[name=nthash]');
    nh.placeholder = '(set via CLI)';
    nh.dataset.cliSet = '1';
  }

  // Target — prefer target_domain over target
  if (d.target_domain) {
    document.getElementById('inp-target-domain').value = d.target_domain;
    const radio = document.querySelector('input[name=target_mode][value=domain]');
    radio.checked = true;
    toggleTargetMode();
  } else if (d.target) {
    document.getElementById('inp-target').value = d.target;
  }

  // Threads / depth
  if (d.host_threads)  document.querySelector('[name=host_threads]').value  = d.host_threads;
  if (d.share_threads) document.querySelector('[name=share_threads]').value = d.share_threads;
  if (d.depth)         document.querySelector('[name=depth]').value         = d.depth;

  // Advanced auth
  if (d.use_ldaps)    document.getElementById('chk-ldaps').checked    = true;
  if (d.use_kerberos) { document.getElementById('chk-kerberos').checked = true; onKerberosChange(); }
  if (d.dc_ip)        document.querySelector('[name=dc_ip]').value     = d.dc_ip;

  // Flash the fields to show they were auto-filled
  const filled = ['domain','username','target','target_domain','host_threads','share_threads','depth'];
  filled.forEach(n => {
    const el = document.querySelector(`[name=${n}]`);
    if (el && el.value) { el.style.borderColor = 'var(--accent)'; setTimeout(() => { el.style.borderColor = ''; }, 1500); }
  });
}

// On load: restore results, seed log offset, start polling or show session picker
Promise.all([
  fetch('/api/results').then(r => r.json()),
  fetch('/api/logs').then(r => r.json()),
  fetch('/api/status').then(r => r.json()),
  fetch('/api/prefill').then(r => r.json()).catch(() => ({ok: false})),
]).then(([_resultsPayload, logs, status, prefill]) => {
  const results = _resultsPayload.results ?? _resultsPayload;
  if (_resultsPayload.scan_id != null) _currentScanId = _resultsPayload.scan_id;
  prefillForm(prefill);
  // Restore in-flight / previously loaded results
  if (results.length) {
    results.forEach(r => {
      if (r.downloaded) _dlState.set(r.unc_path, { state: 'done', local_path: r.local_path || '' });
    });
    allResults = results;
    _serverResultCount = results.length;
    // Batch-append all log entries in a single fragment
    const logArea = document.getElementById('log-area');
    const frag = document.createDocumentFragment();
    results.forEach(r => {
      updateFilterDropdowns(r);
      const div = document.createElement('div');
      div.className = 'log-entry result';
      const span = document.createElement('span');
      span.className = 'rating-' + r.rating_label;
      span.textContent = '[' + r.rating_label + ']';
      const rest = document.createElement('span');
      const matchPart = r.matched_line ? `[${r.matched_line.substring(0,200)}]` : '';
      rest.textContent = `(${r.rule_name})<${r.size}B>{\\\\${r.host}\\${r.share}\\${r.path}}${matchPart}`;
      div.appendChild(span); div.appendChild(rest);
      frag.appendChild(div);
    });
    logArea.appendChild(frag);
    logArea.scrollTop = logArea.scrollHeight;
    updateCount();
  }

  // Restore log entries and seed offset
  logs.filter(l => l.level !== 'result').forEach(l => addLog(l.msg, l.level));
  _logOffset = logs.length;

  setStatus(status.running);

  if (status.running) {
    // CLI-launched scan already running — sync results then start polling
    startPolling();
    addLog('[*] Scan in progress — live feed active', 'info');
  } else if (!results.length) {
    // GUI-only startup with no active scan and no results — show session picker
    fetch('/api/session-list').then(r => r.json()).then(sessions => {
      if (sessions.length) showSessionBanner(sessions);
    });
  }
});
</script>
